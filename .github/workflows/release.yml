name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build + package
        run: |
          mkdir -p dist

          VERSION=${GITHUB_REF_NAME}

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do

              # Skip unsupported combos if needed
              if [ "$GOOS" = "windows" ] && [ "$GOARCH" = "arm64" ]; then
                continue
              fi

              EXT=""
              if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

              NAME="dbq_${VERSION}_${GOOS}_${GOARCH}"
              OUT="dist/$NAME"

              GOOS=$GOOS GOARCH=$GOARCH \
                go build -ldflags="-X main.version=$VERSION" -o "$OUT$EXT" ./cmd

              # Package (tar.gz for unix, zip for windows)
              if [ "$GOOS" = "windows" ]; then
                zip "$OUT.zip" "$OUT$EXT"
                rm "$OUT$EXT"
              else
                cp "$OUT" dist/dbq
                tar -czf "$OUT.tar.gz" -C dist "dbq"
                rm dist/dbq "$OUT"
              fi
            done
          done

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
